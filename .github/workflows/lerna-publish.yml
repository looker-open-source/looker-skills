name: Publish NPM Packages

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      ref:
        description: 'commit/tag/branch to release from'
        required: true

jobs:
  publish:
    if: >
      github.event.inputs ||
      (github.event.release && !github.event.release.draft && !github.event.release.prerelease)
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{  github.event.release.tag_name || github.event.inputs.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          registry-url: https://wombat-dressing-room.appspot.com
          scope: '@looker'

      - name: Publish to NPM registry
        run: npx lerna publish from-package --yes --no-verify-access
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_RELEASE_BACKED }}
